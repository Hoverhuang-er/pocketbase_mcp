name: Build And Release

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Release version tag
        required: false
        default: v0.1.0

permissions:
  contents: write
  packages: write

env:
  APP_NAME: pocketbase_mcp
  ENTRYPOINT: bin/pocketbase_mcp_server.dart

jobs:
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION="${{ github.ref_name }}"
          else
            VERSION="v0.1.0"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

  build-binaries:
    runs-on: ${{ matrix.runs_on }}
    needs: resolve-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: windows-x64
            runs_on: windows-latest
            target_os: windows
            target_arch: x64
            ext: .exe
          - id: linux-x64
            runs_on: ubuntu-latest
            target_os: linux
            target_arch: x64
            ext: ''
          - id: linux-riscv64
            runs_on: ubuntu-latest
            target_os: linux
            target_arch: riscv64
            ext: ''
          - id: linux-arm64
            runs_on: ubuntu-latest
            target_os: linux
            target_arch: arm64
            ext: ''
          - id: darwin-x64
            runs_on: macos-13
            target_os: macos
            target_arch: x64
            ext: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Get dependencies
        run: dart pub get

      - name: Build AOT binary
        shell: bash
        run: |
          OUT_DIR="dist/${{ matrix.id }}"
          BIN_NAME="${APP_NAME}${{ matrix.ext }}"
          mkdir -p "$OUT_DIR"

          dart compile exe "$ENTRYPOINT" \
            --target-os="${{ matrix.target_os }}" \
            --target-arch="${{ matrix.target_arch }}" \
            -o "$OUT_DIR/$BIN_NAME"

          if [[ "${{ matrix.target_os }}" != "windows" ]]; then
            chmod +x "$OUT_DIR/$BIN_NAME"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.id }}
          path: dist/${{ matrix.id }}/
          if-no-files-found: error

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: binary-*
          merge-multiple: false

      - name: Reorganize artifact layout
        shell: bash
        run: |
          for dir in dist/binary-*; do
            target="${dir#dist/binary-}"
            mv "$dir" "dist/$target"
          done

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p packages
          VERSION="${{ needs.resolve-version.outputs.version }}"

          for target_dir in dist/*; do
            [[ -d "$target_dir" ]] || continue
            target="$(basename "$target_dir")"

            if [[ "$target" == windows-* ]]; then
              (cd "$target_dir" && zip -r "../../packages/${APP_NAME}-${VERSION}-${target}.zip" .)
            else
              tar -C "$target_dir" -czf "packages/${APP_NAME}-${VERSION}-${target}.tar.gz" .
            fi
          done

      - name: Publish/Update release assets
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ needs.resolve-version.outputs.version }}
          name: ${{ needs.resolve-version.outputs.version }}
          body: Automated release for ${{ needs.resolve-version.outputs.version }}
          allowUpdates: true
          updateOnlyUnreleased: false
          draft: false
          prerelease: false
          artifacts: packages/*
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-docker-linux:
    runs-on: ubuntu-latest
    needs:
      - resolve-version
      - build-binaries
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: linux-x64
            platform: linux/amd64
          - id: linux-arm64
            platform: linux/arm64
          - id: linux-riscv64
            platform: linux/riscv64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: binary-${{ matrix.id }}
          path: dist/${{ matrix.id }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.resolve-version.outputs.version }}-${{ matrix.id }}
            type=raw,value=latest-${{ matrix.id }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Dockerfile.binary
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BIN_PATH=dist/${{ matrix.id }}/${{ env.APP_NAME }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  publish-docker-windows:
    runs-on: windows-2022
    needs:
      - resolve-version
      - build-binaries
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download binary artifact
        uses: actions/download-artifact@v4
        with:
          name: binary-windows-x64
          path: dist/windows-x64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.resolve-version.outputs.version }}-windows-x64
            type=raw,value=latest-windows-x64

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .github/docker/Dockerfile.windows
          platforms: windows/amd64
          push: true
          build-args: |
            BIN_PATH=dist/windows-x64/${{ env.APP_NAME }}.exe
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
